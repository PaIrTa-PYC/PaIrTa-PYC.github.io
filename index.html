<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaIrTa_PYC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border: none !important;
            outline: none !important;

            /* 禁止选中全站内容 */
            -webkit-user-select: none !important;
            -moz-user-select: none !important;
            -ms-user-select: none !important;
            user-select: none !important;
            -webkit-user-drag: none !important;
        }

        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text: #fff;
            --accent: #9cc9ff;
            --light: rgba(150, 200, 255, 0.3);
            --card-bg: rgba(255,255,255,0.2);
            --tag: rgba(130, 170, 255, 0.3);
            --blue-text: #63a8ff;
        }

        [dark] {
            --glass: rgba(20, 30, 50, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --accent: #70a8ff;
            --light: rgba(100, 150, 200, 0.25);
            --card-bg: rgba(25, 35, 60, 0.3);
            --tag: rgba(80, 120, 200, 0.3);
            --blue-text: #7cb8ff;
        }

        body {
            min-height: 100vh;
            background: url('data/2.jpg') center/cover fixed;
            padding: 20px;
            overflow-x: hidden;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .dynamic-island {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            width: 600px;
            height: 46px;
            background: var(--glass);
            backdrop-filter: blur(12px) !important;
            -webkit-backdrop-filter: blur(12px) !important;
            border: 1px solid var(--glass-border);
            border-radius: 23px;
            z-index: 999999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
            transition: all 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 0;
            cursor: pointer;
        }
        .dynamic-island:hover {
            transform: translateX(-50%) scale(1.2);
            transition: transform 0.2s ease;
        }
        .dynamic-island.expand {
            transform: translateX(-50%) scale(1);
            width: 720px;
            height: 46px;
            border-radius: 23px;
            opacity: 1;
        }
        .dynamic-island.time-mode {
            width: 260px !important;
            height: 46px !important;
            border-radius: 23px !important;
            padding: 0 14px !important;
            font-size: 14px !important;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999999;
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: #fff;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            transform: translateY(-5px);
        }

        .left-wrap {
            position: fixed;
            left: 20px;
            top: 95px;
            z-index: 99;
            width: 180px;
        }
        .nav-card {
            width: 180px;
            min-height: 460px;
            padding: 30px 15px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            overflow: hidden !important;
            transition: all 0.3s ease;
        }
        .nav-card:hover {
            transform: translateY(-5px);
        }
        .nav-card:hover .nav-item {
            color: #000 !important;
        }
        .nav-item {
            padding: 18px 15px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-size: 16px;
            position: relative;
            overflow: hidden;
            color: #fff !important;
            transition: none;
        }
        .nav-item::after {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            z-index: -1;
            transform: translateY(-100%);
            transition: none;
        }
        .nav-item.active::after {
            transform: translateY(0);
        }

        .right-wrap {
            position: fixed;
            right: 20px;
            top: 95px;
            z-index: 99;
            width: 180px;
        }
        .hello-card {
            width: 180px;
            height: 220px;
            padding: 25px 15px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden !important;
            transition: all 0.3s ease;
        }
        .hello-card:hover {
            transform: translateY(-5px);
        }
        .hello-card:hover .hello-text,
        .hello-card:hover .notice-title,
        .hello-card:hover .notice-desc {
            color: #000 !important;
        }
        .hello-text {
            font-size: 16px;
            color: var(--blue-text);
            font-weight: 500;
            margin-bottom: 12px;
        }
        .greet-line {
            width: 60%;
            height: 1px;
            background: rgba(255,255,255,0.4);
            margin: 0 auto 15px;
        }
        .notice-title {
            font-size: 15px;
            color: #fff;
            margin-bottom: 10px;
        }
        .notice-desc {
            font-size: 12px;
            color: #eee;
            line-height: 1.5;
            padding: 0 5px;
        }

        .container {
            max-width: 1000px;
            margin: 80px auto 25px;
            margin-left: 220px;
            margin-right: 220px;
            position: relative;
            z-index: 2;
            min-height: 600px;
        }
        
        .content-wrapper {
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            opacity: 1;
            transform: translateY(0);
        }
        .content-wrapper.hide {
            opacity: 0;
            transform: translateY(80px);
            pointer-events: none;
        }

        .main-card {
            background: var(--glass) !important;
            backdrop-filter: blur(12px) !important;
            border: 1px solid var(--glass-border) !important;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }
        .main-card:hover {
            transform: translateY(-5px);
        }
        .main-card:hover p,
        .main-card:hover h1,
        .main-card:hover h2,
        .main-card:hover span {
            color: #000 !important;
        }
        .header-card { padding: 40px; text-align: center; }
        .avatar { width:130px; height:130px; border-radius:50%; border:4px solid var(--glass-border); margin-bottom:20px; object-fit:cover; }
        .socials { display:flex; gap:20px; justify-content:center; margin-top:20px; }
        .socials a { color:#fff !important; font-size:24px; transition:0.3s; text-decoration:none; }
        
        /* GitHub 悬停变黑 */
        .socials a.github:hover {
            color: #000 !important;
        }
        /* B站 悬停变蓝 */
        .socials a.bilibili:hover {
            color: #00a1d6 !important;
        }

        .content-card { padding:30px; }
        .content-card h2 { color:var(--accent); margin-bottom:20px; font-size:24px; padding-left:12px; }
        .skills { display:flex; flex-wrap:wrap; gap:12px; margin-top:15px; }
        .tag { padding:8px 16px; background:var(--tag); border-radius:30px; }

        .copyright-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            font-size: 16px;
            color: #fff;
            margin-top: 5px;
            transition: all 0.3s ease;
        }
        .copyright-card:hover {
            transform: translateY(-5px);
        }
        .copyright-card:hover p {
            color: #000 !important;
        }

        /* 下载卡片 */
        .dev-card {
            display: none;
        }
        .dev-card.show {
            display: block;
        }
        .download-card {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 240px;
            height: 280px;
            border-radius: 20px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s ease !important;
            z-index: 10;
        }
        .download-card:hover {
            transform: translateY(-5px);
        }
        .download-card:hover .download-card-title,
        .download-card:hover .download-card-desc {
            color: #000 !important;
        }
        .download-card.expand {
            width: 420px !important;
            height: 480px !important;
            top: 25% !important;
            left: 50% !important;
            transform: translate(-50%, -50%) scale(1) !important;
            background: var(--glass) !important;
            border-color: var(--glass-border) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
        }
        [dark] .download-card.expand {
            background: rgba(20, 30, 50, 0.6) !important;
            color: #fff !important;
        }
        [dark] .download-card.expand .download-card-title,
        [dark] .download-card.expand .download-card-desc {
            color: #fff !important;
        }
        .download-card.expand .download-card-title,
        .download-card.expand .download-card-desc {
            color: #000 !important;
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #222;
            color: #fff;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: all 0.3s ease;
        }
        .close-btn:hover {
            background: #d32f2f;
        }
        .download-card.expand .close-btn {
            opacity: 1 !important;
            pointer-events: all !important;
        }
        .download-card-img {
            width: 120px;
            height: 120px;
            border-radius: 14px;
            object-fit: cover;
            margin-bottom: 15px;
            transition: all 0.4s ease;
        }
        .download-card.expand .download-card-img {
            width: 180px;
            height: 180px;
        }
        .download-card-title {
            font-size: 17px;
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 8px;
            transition: all 0.4s ease;
        }
        .download-card-desc {
            font-size: 13px;
            color: #eee;
            line-height: 1.4;
            transition: all 0.4s ease;
        }
        .download-btn {
            position: absolute;
            left: 25px;
            bottom: 25px;
            padding: 10px 22px;
            border-radius: 12px;
            background: #1E88E5;
            color: #fff !important;
            font-size: 15px;
            text-decoration: none;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            background: #0D47A1;
        }
        .download-card.expand .download-btn {
            opacity: 1 !important;
            pointer-events: all !important;
        }
    </style>
</head>
<body>

<div class="dynamic-island" id="visitText">欢迎~加载中...</div>
<div class="theme-toggle" id="themeBtn"><i class="fa-solid fa-moon"></i></div>

<div class="left-wrap">
    <div class="nav-card glass-card">
        <div class="nav-item active" data-page="home">主页</div>
        <div class="nav-item" data-page="download">下载</div>
    </div>
</div>

<div class="right-wrap">
    <div class="hello-card glass-card">
        <div class="hello-text" id="greetText">早上好</div>
        <div class="greet-line"></div>
        <div class="notice-title">公告</div>
        <div class="notice-desc">当前开发时间仓促，暂无时间适配手机，预计过几个月再适配。在此期间，手机可以通过工具箱 -> 访问电脑版/桌面模式 来访问。</div>
    </div>
</div>

<div class="container">
    <div class="dev-card">
        <div class="download-card" id="dcard">
            <div class="close-btn" id="closeBtn">✕</div>
            <img src="download/1.jpg" class="download-card-img">
            <div class="download-card-title">布吉岛材质包1.8</div>
            <div class="download-card-desc">适用于 1.20.1 的我的世界布吉岛服务器材质包</div>
            <a href="https://spraystudio.lanzoub.com/isNhd32tf78f" class="download-btn" target="_blank">立即下载</a>
        </div>
    </div>

    <div class="content-wrapper" id="content">
        <div class="header-card main-card">
            <img src="data/1.jpg" class="avatar">
            <h1>PaIrTa_PYC</h1>
            <p>你可以期待太阳从东方升起，而风却随心所欲的从四面八方吹来。</p>
            <div class="socials">
                <a href="https://github.com/PaIrTa-PYC" target="_blank" class="github"><i class="fab fa-github"></i></a>
                <a href="https://space.bilibili.com/652131791" target="_blank" class="bilibili"><i class="fab fa-bilibili"></i></a>
            </div>
        </div>
        <div class="content-card main-card">
            <h2>关于我</h2>
            <p>我是 PaIrTa_PYC？</p>
        </div>
        <div class="content-card main-card">
            <h2>我的技能</h2>
            <div class="skills"><span class="tag">C++</span></div>
        </div>
        <div class="content-card main-card">
            <h2>联系我</h2>
            <p>邮箱：3834554060@qq.com</p>
        </div>
        <div class="copyright-card">Copyright © PaIrTa_PYC All Rights Reserved</div>
    </div>
</div>

<script>
    const island = document.getElementById("visitText");
    const dcard = document.getElementById("dcard");
    const closeBtn = document.getElementById("closeBtn");
    const themeBtn = document.getElementById("themeBtn");
    const greetText = document.getElementById("greetText");
    const navItems = document.querySelectorAll('.nav-item');
    const content = document.getElementById('content');
    const devCard = document.querySelector('.dev-card');
    let islandTimer = null;

    // 显示时间
    function showDateTime() {
        clearTimeout(islandTimer);
        islandTimer = setTimeout(() => {
            const now = new Date();
            const date = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,'0') + "-" + String(now.getDate()).padStart(2,'0');
            const time = String(now.getHours()).padStart(2,'0') + ":" + 
                         String(now.getMinutes()).padStart(2,'0') + ":" + 
                         String(now.getSeconds()).padStart(2,'0');
            island.innerText = `${date} ${time}`;
            island.classList.add('time-mode');
        }, 100);
    }

    // 访问次数
    let visitCount = localStorage.getItem('visitCount');
    if (!visitCount) {
        visitCount = 1;
    } else {
        visitCount = parseInt(visitCount) + 1;
    }
    localStorage.setItem('visitCount', visitCount);

    function getWelcomeText() {
        if (visitCount === 1) {
            return "欢迎来到PaIrTa_PYC的小站~";
        }
        if (visitCount % 10 === 0) {
            return `你已经访问${visitCount}次啦~酱酱~`;
        }
        if (visitCount >= 2 && visitCount <= 9) {
            return `这是你的第${visitCount}次访问~`;
        }
        return `欢迎回来~这是你的第${visitCount}次访问`;
    }

    // 问候语
    function setGreeting() {
        const hour = new Date().getHours();
        let text = "";
        if (hour >= 6 && hour < 10) text = "早上好";
        else if (hour >= 10 && hour < 13) text = "中午好";
        else if (hour >= 13 && hour < 18) text = "下午好";
        else text = "晚上好";
        greetText.textContent = text;
    }

    // 深色模式
    let darkMode = localStorage.getItem('darkMode') !== 'false';
    document.body.toggleAttribute('dark', darkMode);
    themeBtn.innerHTML = darkMode ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';

    themeBtn.onclick = () => {
        clearTimeout(islandTimer);
        darkMode = !darkMode;
        document.body.toggleAttribute('dark', darkMode);
        localStorage.setItem('darkMode', darkMode);
        island.classList.remove('time-mode');

        if(darkMode) {
            island.innerText = "已切换成深色模式";
            themeBtn.innerHTML = '<i class="fa-solid fa-sun"></i>';
        } else {
            island.innerText = "已切换成浅色模式";
            themeBtn.innerHTML = '<i class="fa-solid fa-moon"></i>';
        }
        setTimeout(showDateTime, 2000);
    };

    // 下载卡片
    dcard.onclick = (e) => {
        if(e.target.closest('.download-btn')) return;
        dcard.classList.add('expand');
    };
    closeBtn.onclick = (e) => {
        e.stopPropagation();
        dcard.classList.remove('expand');
    };

    // 导航
    navItems.forEach(item => {
        item.onclick = () => {
            navItems.forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            
            if(item.dataset.page === 'download'){
                content.classList.add('hide');
                devCard.classList.add('show');
            }else{
                content.classList.remove('hide');
                devCard.classList.remove('show');
                dcard.classList.remove('expand');
            }
        };
    });

    // 页面加载
    window.addEventListener("load", () => {
        setGreeting();
        island.classList.add("expand");
        island.innerText = getWelcomeText();

        setTimeout(() => {
            island.classList.add("shrink");
            showDateTime();
        }, 3000);

        setInterval(() => {
            if (island.innerText.includes(":")) {
                const now = new Date();
                const date = now.getFullYear() + "-" + String(now.getMonth()+1).padStart(2,'0') + "-" + String(now.getDate()).padStart(2,'0');
                const time = String(now.getHours()).padStart(2,'0') + ":" + 
                             String(now.getMinutes()).padStart(2,'0') + ":" + 
                             String(now.getSeconds()).padStart(2,'0');
                island.innerText = `${date} ${time}`;
            }
        }, 1000);
    });
</script>
</body>
</html>
