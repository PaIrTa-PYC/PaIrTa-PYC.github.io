<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PaIrTa_PYC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            border: none !important;
            outline: none !important;
            user-select: none;
            -webkit-user-drag: none;
        }

        :root {
            --glass: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text: #fff;
            --accent: #9cc9ff;
            --light: rgba(150, 200, 255, 0.3);
            --card-bg: rgba(255,255,255,0.2);
            --tag: rgba(130, 170, 255, 0.3);
            --blue-text: #63a8ff;
        }

        [dark] {
            --glass: rgba(20, 30, 50, 0.4);
            --glass-border: rgba(255, 255, 255, 0.15);
            --text: #ffffff;
            --accent: #70a1ff;
            --light: rgba(100, 150, 200, 0.25);
            --card-bg: rgba(25, 35, 60, 0.3);
            --tag: rgba(80, 120, 200, 0.3);
            --blue-text: #7cb8ff;
        }

        body {
            min-height: 100vh;
            background: url('data/2.jpg') center/cover fixed;
            padding: 20px;
            overflow-x: hidden;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }

        .dynamic-island {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) scale(0.9);
            width: 320px;
            height: 46px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 23px;
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            gap:12px;
            padding: 0 20px;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            color: #fff;
            font-size: 15px;
            font-weight: 500;
            white-space: nowrap;
            opacity: 1 !important;
            cursor: pointer;
        }
        .dynamic-island.show {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        .dynamic-island:hover {
            transform: translateX(-50%) scale(1.05);
        }
        .dynamic-island.expand {
            width: auto;
            min-width: 320px;
            max-width: 90vw;
            padding: 0 30px;
        }
        .dynamic-island.time-mode {
            width: 320px;
            height: 46px;
            padding: 0 14px;
            font-size: 14px;
        }

        .dynamic-island.login-mode {
            width: 460px;
            height: 180px;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            overflow: hidden;
        }

        .login-title {
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            opacity: 0;
            transition: opacity 0.4s 0.2s ease;
        }
        .login-desc {
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.4s 0.3s ease;
        }
        .username-input {
            width: 70%;
            height: 44px;
            border-radius: 22px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            text-align: center;
            font-size: 15px;
            transition: all 0.3s ease, opacity 0.4s 0.4s ease;
            pointer-events: auto !important;
            z-index: 10 !important;
            opacity: 0;
        }
        .login-mode-active .login-title,
        .login-mode-active .login-desc,
        .login-mode-active .username-input {
            opacity: 1;
        }
        .username-input:focus {
            background: rgba(255,255,255,0.3);
        }
        .username-input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .user-info {
            position: fixed;
            top: 20px;
            left: 20px;
            height: 46px;
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 99999;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 23px;
            padding: 0 18px;
            font-size: 15px;
            color: #fff;
            opacity: 0;
            transition: all 0.5s ease, transform 0.3s ease;
            cursor: pointer;
        }
        .user-info.show {
            opacity: 1;
        }
        .user-info:hover {
            transform: translateY(-5px);
        }
        .user-info i {
            font-size: 18px;
        }

        .user-modal {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: rgba(20, 30, 50, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 24px;
            padding: 30px;
            width: 320px;
            text-align: center;
            z-index: 99999999 !important;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .user-modal.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        .user-modal .icon {
            font-size: 40px;
            margin-bottom: 15px;
        }
        .user-modal .name {
            font-size: 18px;
            margin-bottom: 25px;
        }
        .logout-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s;
        }
        .logout-btn:hover {
            background: rgba(255,255,255,0.25);
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 99999;
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            color: #fff;
            transition: all 0.3s ease;
        }
        .theme-toggle:hover {
            transform: translateY(-5px);
        }

        .left-wrap {
            position: fixed;
            left: 20px;
            top: 95px;
            z-index: 99;
            width: 180px;
        }
        .nav-card {
            width: 180px;
            min-height: 460px;
            padding: 30px 15px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .nav-card:hover {
            transform: translateY(-5px);
        }
        .nav-item {
            padding: 18px 15px;
            border-radius: 12px;
            cursor: pointer;
            text-align: center;
            font-size: 16px;
            color: #fff;
            background: rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .nav-item:hover {
            background: rgba(255,255,255,0.15);
            transform: translateY(-3px);
        }
        .nav-item.active {
            background: rgba(255,255,255,0.2);
            font-weight: 600;
        }

        .right-wrap {
            position: fixed;
            right: 20px;
            top: 95px;
            z-index: 99;
            width: 180px;
        }
        .hello-card {
            width: 180px;
            height: 220px;
            padding: 25px 15px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .hello-card:hover {
            transform: translateY(-5px);
        }
        .hello-text {
            font-size: 16px;
            color: var(--blue-text);
            font-weight: 500;
            margin-bottom: 12px;
        }
        .greet-line {
            width: 60%;
            height: 1px;
            background: rgba(255,255,255,0.4);
            margin: 0 auto 15px;
        }
        .notice-title {
            font-size: 15px;
            color: #fff;
            margin-bottom: 10px;
        }
        .notice-desc {
            font-size: 12px;
            color: #eee;
            line-height: 1.5;
            padding: 0 5px;
        }

        .container {
            max-width: 1000px;
            margin: 80px auto 25px;
            margin-left: 220px;
            margin-right: 220px;
            position: relative;
            z-index: 2;
            min-height: 600px;
        }
        
        .content-wrapper {
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            opacity: 1;
            transform: translateY(0);
        }
        .content-wrapper.hide {
            opacity: 0;
            transform: translateY(80px);
            pointer-events: none;
        }

        .main-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            margin-bottom: 25px;
            transition: all 0.3s ease;
        }
        .main-card:hover {
            transform: translateY(-5px);
        }
        .header-card { padding: 40px; text-align: center; }
        .avatar { width:130px; height:130px; border-radius:50%; border:4px solid var(--glass-border); margin-bottom:20px; object-fit:cover; }
        .socials { display:flex; gap:20px; justify-content:center; margin-top:20px; }
        .socials a { color:#fff; font-size:24px; transition:0.3s; text-decoration:none; }
        .socials a.github:hover { color:#000; }
        .socials a.bilibili:hover { color:#00a1d6; }

        .content-card { padding:30px; }
        .content-card h2 { color:var(--accent); margin-bottom:20px; font-size:24px; padding-left:12px; }
        .skills { display:flex; flex-wrap:wrap; gap:12px; margin-top:15px; }
        .tag { padding:8px 16px; background:var(--tag); border-radius:30px; }

        .copyright-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            font-size: 16px;
            color: #fff;
            margin-top: 5px;
            transition: all 0.3s ease;
        }
        .copyright-card:hover {
            transform: translateY(-5px);
        }

        .dev-card { display: none; }
        .dev-card.show { display: block; }
        .download-card {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 240px;
            height: 280px;
            border-radius: 20px;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s ease;
            z-index: 10;
        }
        .download-card:hover { transform: translateY(-5px); }
        .download-card.expand {
            width: 420px;
            height: 480px;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--glass);
            border-color: var(--glass-border);
            backdrop-filter: blur(20px);
        }
        .download-card-img {
            width: 120px;
            height: 120px;
            border-radius: 14px;
            object-fit: cover;
            margin-bottom: 15px;
            transition: all 0.4s ease;
        }
        .download-card.expand .download-card-img { width: 180px; height: 180px; }
        .download-card-title { font-size: 17px; color: #ffffff; font-weight: 600; margin-bottom: 8px; }
        .download-card-desc { font-size: 13px; color: #eee; line-height: 1.4; }
        
        .btn-group {
            position: absolute;
            left: 25px;
            right: 25px;
            bottom: 25px;
            display: flex;
            gap: 10px;
            opacity: 0;
            pointer-events: none;
            transition: 0.3s;
        }
        .download-card.expand .btn-group {
            opacity: 1;
            pointer-events: auto;
        }
        
        .down-btn {
            flex: 1;
            padding: 10px 0;
            border-radius: 12px;
            background: #1E88E5;
            color: #fff;
            font-size: 15px;
            text-align: center;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .down-btn:hover {
            background: #0D47A1;
        }
        .close-card-btn {
            flex: 1;
            padding: 10px 0;
            border-radius: 12px;
            background: rgba(102,102,102,0.6);
            color: #fff;
            font-size: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .close-card-btn:hover {
            background: rgba(80,80,80,0.8);
        }

        .music-player {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 340px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 12px 15px;
            gap: 8px;
            z-index: 999;
            transition: all 0.3s ease;
        }
        .music-player:hover {
            transform: translateY(-5px);
        }
        .music-main {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .music-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .music-btn {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }
        .music-btn:hover {
            background: rgba(255,255,255,0.25);
            transform: scale(1.1);
        }
        .music-info {
            flex: 1;
            overflow: hidden;
        }
        .music-title {
            font-size: 14px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .music-progress {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
        }
        .progress-time {
            font-size: 12px;
            color: #fff;
            min-width: 40px;
            text-align: center;
        }
        .progress-bar {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }
        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: var(--accent);
            border-radius: 3px;
            transition: width 0.1s linear;
            width: 0%;
        }
    </style>
</head>

<script>
document.oncontextmenu = () => false;
document.onkeydown = e => {
    if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.key === 'U')) return false;
};
setInterval(()=>{if(window.console)console.clear();},100);
window.devtoolsOpen=false;
setInterval(()=>{let s=performance.now();debugger;if(performance.now()-s>100)window.devtoolsOpen=true;},1000);
Object.defineProperty(window,'devtoolsOpen',{get(){location.reload();}});

const island = document.getElementById("visitText");
const userInfo = document.getElementById("userInfo");
const showName = document.getElementById("showName");
const userModal = document.getElementById("userModal");
const modalName = document.getElementById("modalName");
const logoutBtn = document.getElementById("logoutBtn");
const themeBtn = document.getElementById("themeBtn");
const greetText = document.getElementById("greetText");
const navItems = document.querySelectorAll('.nav-item');
const content = document.getElementById('content');
const devCard = document.querySelector('.dev-card');
const dcard = document.getElementById('dcard');
const closeCardBtn = document.querySelector('.close-card-btn');
let islandTimer = null;

const savedName = localStorage.getItem('username');
const skipLogin = localStorage.getItem('skipLogin');

function adaptIslandWidth(text){
    const len = text.length;
    let baseW = 320;
    if(len > 16) baseW = 320 + (len - 16) * 12;
    island.style.width = baseW + "px";
}

function showDateTime() {
    clearTimeout(islandTimer);
    islandTimer = setTimeout(() => {
        if (island.classList.contains('login-mode')) return;
        const now = new Date();
        const yy = String(now.getFullYear()).slice(-2);
        const mm = String(now.getMonth()+1).padStart(2,'0');
        const dd = String(now.getDate()).padStart(2,'0');
        const hh = String(now.getHours()).padStart(2,'0');
        const mi = String(now.getMinutes()).padStart(2,'0');
        const ss = String(now.getSeconds()).padStart(2,'0');
        const dateStr = `<i class="fa-solid fa-calendar-days"></i> ${yy}-${mm}-${dd}`;
        const timeStr = `<i class="fa-solid fa-clock"></i> ${hh}:${mi}:${ss}`;
        island.innerHTML = `${dateStr} · ${timeStr}`;
        island.classList.add('time-mode');
    }, 100);
}

function setGreeting() {
    const hour = new Date().getHours();
    let text = "";
    if (hour >= 6 && hour < 10) text = "早上好";
    else if (hour >= 10 && hour < 13) text = "中午好";
    else if (hour >= 13 && hour < 18) text = "下午好";
    else text = "晚上好";
    greetText.textContent = text;
}

function showLoginUI() {
    clearTimeout(islandTimer);
    island.classList.add("login-mode");
    island.classList.add("login-mode-active");
    island.innerHTML = `
        <div class="login-title">登录</div>
        <div class="login-desc">怎么称呼你？</div>
        <input type="text" class="username-input" id="usernameInput" placeholder="请输入你的名字" autocomplete="off">
    `;
    const input = document.getElementById('usernameInput');
    setTimeout(()=>input.focus(),400);
    input.addEventListener('keydown',e=>{
        if(e.key==='Enter'){
            const name = input.value.trim();
            if(!name)return;
            localStorage.setItem('username',name);
            localStorage.removeItem('skipLogin');
            showName.innerText=name;
            modalName.innerText=name;
            userInfo.classList.add('show');
            island.classList.remove('login-mode','login-mode-active');
            island.classList.add('expand');
            island.innerText=`欢迎你，${name}~`;
            adaptIslandWidth(island.innerText);
            setTimeout(showDateTime,3000);
        }
    });
}

let darkMode = localStorage.getItem('darkMode') !== 'false';
document.body.toggleAttribute('dark',darkMode);
themeBtn.innerHTML = darkMode ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';

themeBtn.onclick = () => {
    clearTimeout(islandTimer);
    darkMode = !darkMode;
    document.body.toggleAttribute('dark',darkMode);
    localStorage.setItem('darkMode',darkMode);
    island.classList.remove('time-mode');
    const tip = darkMode ? "已切换成深色模式" : "已切换成浅色模式";
    island.innerText=tip;
    adaptIslandWidth(tip);
    themeBtn.innerHTML = darkMode ? '<i class="fa-solid fa-sun"></i>' : '<i class="fa-solid fa-moon"></i>';
    setTimeout(showDateTime,2000);
};

dcard.onclick = e=>{
    if(e.target.closest('.down-btn')||e.target.closest('.close-card-btn'))return;
    dcard.classList.add('expand');
};
closeCardBtn.onclick = e=>{
    e.stopPropagation();
    dcard.classList.remove('expand');
};
document.addEventListener('click',e=>{
    if(!dcard.contains(e.target))dcard.classList.remove('expand');
});

navItems.forEach(item=>{
    item.onclick=()=>{
        navItems.forEach(i=>i.classList.remove('active'));
        item.classList.add('active');
        content.classList.toggle('hide',item.dataset.page==='download');
        devCard.classList.toggle('show',item.dataset.page==='download');
        if(item.dataset.page!=='download')dcard.classList.remove('expand');
    };
});

userInfo.onclick = e=>{
    e.stopPropagation();
    const name = localStorage.getItem('username');
    if(!name||name==='guest')showLoginUI();
    else userModal.classList.add('show');
};
userModal.onclick=e=>e.stopPropagation();
document.body.onclick=()=>userModal.classList.remove('show');

logoutBtn.onclick=()=>{
    localStorage.setItem('username','guest');
    localStorage.setItem('skipLogin','true');
    showName.innerText='guest';
    modalName.innerText='guest';
    userModal.classList.remove('show');
    island.classList.remove('login-mode','time-mode','login-mode-active');
    island.classList.add('expand');
    island.innerText='已退出登录';
    adaptIslandWidth(island.innerText);
    setTimeout(showDateTime,2000);
};

const audioPlayer = document.getElementById('audioPlayer');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const musicTitle = document.getElementById('musicTitle');
const progressFill = document.getElementById('progressFill');
const progressBar = document.getElementById('progressBar');
const currentTimeEl = document.getElementById('currentTime');
const totalTimeEl = document.getElementById('totalTime');

const playlist = ["《你若三东》全损版.mp3","《你若三东》(DJ沈乐版）.mp3"];
let currentIndex=0,isPlaying=false,isSeeking=false;

function formatTime(s){
    let m=Math.floor(s/60),sec=Math.floor(s%60);
    return `${m}:${sec<10?'0'+sec:sec}`;
}
function loadMusic(){
    let src=`music/${playlist[currentIndex]}`;
    audioPlayer.src=src;
    musicTitle.textContent=playlist[currentIndex].replace('.mp3','');
    audioPlayer.load();
}
function updateProgress(){
    if(isSeeking)return;
    let pct=(audioPlayer.currentTime/audioPlayer.duration)*100||0;
    progressFill.style.width=pct+'%';
    currentTimeEl.textContent=formatTime(audioPlayer.currentTime);
}
function setTotalTime(){totalTimeEl.textContent=formatTime(audioPlayer.duration||0);}
function togglePlay(){
    if(isPlaying){audioPlayer.pause();playBtn.innerHTML='<i class="fa-solid fa-play"></i>';}
    else{audioPlayer.play();playBtn.innerHTML='<i class="fa-solid fa-pause"></i>';}
    isPlaying=!isPlaying;
}
function prevMusic(){
    currentIndex=(currentIndex-1+playlist.length)%playlist.length;
    loadMusic();
    audioPlayer.play().then(()=>{isPlaying=true;playBtn.innerHTML='<i class="fa-solid fa-pause"></i>';});
}
function nextMusic(){
    currentIndex=(currentIndex+1)%playlist.length;
    loadMusic();
    audioPlayer.play().then(()=>{isPlaying=true;playBtn.innerHTML='<i class="fa-solid fa-pause"></i>';});
}

progressBar.addEventListener('mousedown',e=>{
    isSeeking=true;
    let rect=progressBar.getBoundingClientRect();
    let pct=(e.clientX-rect.left)/rect.width;
    audioPlayer.currentTime=pct*audioPlayer.duration;
    updateProgress();
});
window.addEventListener('mousemove',e=>{
    if(!isSeeking)return;
    let rect=progressBar.getBoundingClientRect();
    let pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
    audioPlayer.currentTime=pct*audioPlayer.duration;
    updateProgress();
});
window.addEventListener('mouseup',()=>isSeeking=false);

audioPlayer.addEventListener('timeupdate',updateProgress);
audioPlayer.addEventListener('loadedmetadata',setTotalTime);
audioPlayer.addEventListener('ended',nextMusic);
playBtn.addEventListener('click',togglePlay);
prevBtn.addEventListener('click',prevMusic);
nextBtn.addEventListener('click',nextMusic);
loadMusic();

window.addEventListener("load", () => {
    setGreeting();
    island.classList.add("show");
    const name = localStorage.getItem('username');
    if(name&&name!=='guest'){
        showName.innerText=name;
        modalName.innerText=name;
        userInfo.classList.add('show');
        island.classList.add("expand");
        island.innerText=`欢迎回来，${name}~`;
        adaptIslandWidth(island.innerText);
        setTimeout(showDateTime,3000);
    }else{
        showName.innerText='guest';
        modalName.innerText='guest';
        userInfo.classList.add('show');
        if(!skipLogin){
            showLoginUI();
        }else{
            island.classList.add("expand");
            island.innerText='欢迎访问';
            adaptIslandWidth('欢迎访问');
            setTimeout(showDateTime,3000);
        }
    }
    setInterval(()=>{
        if(island.innerHTML.includes(':')&&!island.classList.contains('login-mode')){
            const now=new Date();
            const yy=String(now.getFullYear()).slice(-2);
            const mm=String(now.getMonth()+1).padStart(2,'0');
            const dd=String(now.getDate()).padStart(2,'0');
            const hh=String(now.getHours()).padStart(2,'0');
            const mi=String(now.getMinutes()).padStart(2,'0');
            const ss=String(now.getSeconds()).padStart(2,'0');
            island.innerHTML=`<i class="fa-solid fa-calendar-days"></i> ${yy}-${mm}-${dd} · <i class="fa-solid fa-clock"></i> ${hh}:${mi}:${ss}`;
        }
    },1000);
});
</script>
